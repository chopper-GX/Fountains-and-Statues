estoration.", "image": "photos/rawlins_in_rawlins_park.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.04209237794483, 38.895699034887926]}}, {"type": "Feature", "properties": {"name": "United Spanish War Veterans Memorial (“The Hiker”)", "category": "Statue", "description": "The United Spanish War Veterans Memorial is often called &#8220;The Hiker&#8221; and honors soldiers who served in the Spanish-American War, which was part of a longer struggle of Cuba to gain independence from Spain.", "image": "photos/united_spanish_war_veterans_memorial_hiker.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.0624160017736, 38.88466917374417]}}, {"type": "Feature", "properties": {"name": "Thomas Jefferson at Memorial", "category": "Statue", "description": "The Thomas Jefferson Memorial honors the principal author of the Declaration of Independence and the third U.S. president.", "image": "photos/thomas_jefferson_memorial.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.0365, 38.8814]}}, {"type": "Feature", "properties": {"name": "The Seabees Statues", "category": "Statue", "description": "The National Seabee Memorial, located near the entrance to Arlington National Cemetery, honors the U.S. Navy's Construction Battalions and their wartime service.", "image": "photos/the_seabees_statues.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.06265157351388, 38.88500752417561]}}, {"type": "Feature", "properties": {"name": "Bolivar Equestrian in Bolivar Park", "category": "Statue", "description": "The Simón Bolívar Equestrian statue was closed on Dec. 26, 2025, and reopened on May 15 after statue conservation and site restoration.", "image": "photos/bolivar_equestrian_statue.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.04202307794768, 38.89312249369262]}}, {"type": "Feature", "properties": {"name": "Sheridan Statue", "category": "Statue", "description": "The Philip Sheridan Memorial was closed on Dec. 29, 2025, until May 15 for fountain and s n.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.03430523662685, 38.89671074277261]}}, {"type": "Feature", "properties": {"name": "Bernardo de Galvez Statue", "category": "Statue", "description": "The Bernardo de Gálvez Memorial honors the Spanish military leader who aided the American Revolution.", "image": "photos/bernardo_de_galvez_statue.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.04838967630356, 38.89574519747127]}}, {"type": "Feature", "properties": {"name": "George Washington at Washington Circle", "category": "Statue", "description": "The George Washington statue in Washington Circle was the first equestrian statue cast in bronze in the United States.", "image": "photos/george_washington_washington_circle.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.05011998534341, 38.90251845826684]}}, {"type": "Feature", "properties": {"name": "Lincoln Statue in Lincoln Memorial", "category": "Statue", "description": "The Lincoln Statue in the Lincoln Memorial honors Abraham Lincoln, the 16th president, and his role in preserving the Union.", "image": "photos/lincoln_statue_in_memorial.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.05017548031876, 38.88930111098366]}}, {"type": "Feature", "properties": {"name": "George Washington Statue in White House Rose Garden", "category": "Statue", "description": "The George Washington statue was moved from the Washington Monument in October 2025 to its new location in the White House Rose Garden. (AP Photo/Mark Schiefelbein)", "image": "photos/george_washington_rose_garden.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.03720162524164, 38.897491818039484]}}, {"type": "Feature", "properties": {"name": "Taras Shevchenko Memorial", "category": "Statue", "description": "The Taras Shevchenko Memorial closed on Jan. 8 for improvements. The statue honoring the Ukrainian national hero was reopened on May 20.", "image": "photos/taras_shevchenko_statue.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.04901495735004, 38.91008394001456]}}, {"type": "Feature", "properties": {"name": "Lincoln Memorial Reflecting Pool", "category": "Fountain", "description": "After weeks of repair, the Lincoln Memorial Reflecting Pool reopened on June 6. The project involved replacing the pool's original gray stone bottom with a dark blue, industrial-grade waterproof coating, a specific shade selected to reflect the color of the American flag.", "image": "photos/lincoln_reflecting_pool.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.0447596675454, 38.88925990995435]}}, {"type": "Feature", "properties": {"name": "Christopher Columbus Memorial Fountain", "category": "Fountain", "description": "The Christopher Columbus Memorial Fountain was closed on Jan. 8 and reopened on May 29, following five months of work including structural repairs, stone conservation, modernized water systems, and improvements to accessibility.", "image": "photos/christopher_columbus_memorial_fountain.jpg"}, "geometry": {"type": "Point", "coordinates": [-77.00657845929516, 38.89648771568315]}}]};

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/bright',
  center: [-77.0369, 38.9007],
  zoom: 12.45,
  pitch: 0,
  bearing: 0,
  scrollZoom: false,
  cooperativeGestures: true
});
map.addControl(new maplibregl.NavigationControl({visualizePitch:false}), 'top-right');

map.on('load', async () => {

  // ── 1. Restyle basemap ──
  map.getStyle().layers.forEach(layer => {
    const id = layer.id;
    const sl = (layer['source-layer'] || '').toLowerCase();
    const type = layer.type;
    if (layer.source === 'places') return;

    // Hide POI icons
    if (sl === 'poi' || id.includes('poi') || id.includes('icon')) {
      map.setLayoutProperty(id, 'visibility', 'none'); return;
    }
    // Background: near-white
    if (type === 'background') {
      try { map.setPaintProperty(id, 'background-color', '#f8f8f8'); } catch(e) {} return;
    }
    // Water: #e5eef9
    if (sl === 'water') {
      if (type === 'fill') { try { map.setPaintProperty(id, 'fill-color', '#e5eef9'); } catch(e) {} }
      return;
    }
    if (sl === 'waterway') {
      if (type === 'line') { try { map.setPaintProperty(id, 'line-color', '#c8dff3'); } catch(e) {} }
      return;
    }
    // Parks / landcover: #e5e9d7
    if (sl === 'park' || id.includes('park')) {
      if (type === 'fill') { try { map.setPaintProperty(id, 'fill-color', '#e5e9d7'); } catch(e) {} }
      return;
    }
    if (sl === 'landcover') {
      if (type === 'fill') { try { map.setPaintProperty(id, 'fill-color', '#e5e9d7'); } catch(e) {} }
      return;
    }
    // Landuse: neutralize ALL (kill pink/cream commercial zones)
    if (sl === 'landuse') {
      if (type === 'fill') { try { map.setPaintProperty(id, 'fill-color', '#f5f5f5'); } catch(e) {} }
      return;
    }
    // Buildings: #f0f0f0
    if (sl === 'building' || id.includes('building')) {
      if (type === 'fill') {
        try { map.setPaintProperty(id, 'fill-color', '#f0f0f0'); } catch(e) {}
        try { map.setPaintProperty(id, 'fill-outline-color', 'rgba(0,0,0,0.08)'); } catch(e) {}
      } else if (type === 'fill-extrusion') {
        map.setLayoutProperty(id, 'visibility', 'none');
      } else if (type === 'line') {
        map.setLayoutProperty(id, 'visibility', 'none');
      }
      return;
    }
    // Roads: white; hide direction-arrow symbols
    if (sl === 'transportation') {
      if (type === 'line') { try { map.setPaintProperty(id, 'line-color', '#ffffff'); } catch(e) {} }
      else if (type === 'fill') { try { map.setPaintProperty(id, 'fill-color', '#ffffff'); } catch(e) {} }
      else if (type === 'symbol') { map.setLayoutProperty(id, 'visibility', 'none'); }
      return;
    }
    // Road labels: hide direction arrows, smaller text, gray color (no pink)
    if (sl === 'transportation_name') {
      try { map.setPaintProperty(id, 'icon-opacity', 0); } catch(e) {}
      try { map.setLayoutProperty(id, 'text-size', 8); } catch(e) {}
      try { map.setPaintProperty(id, 'text-color', '#888888'); } catch(e) {}
      try { map.setPaintProperty(id, 'text-halo-color', 'rgba(255,255,255,0.9)'); } catch(e) {}
      return;
    }
    // Aeroway
    if (sl === 'aeroway' && type === 'fill') {
      try { map.setPaintProperty(id, 'fill-color', '#ececec'); } catch(e) {}
    }
  });

  // ── 2. Load SVG icons (2x for retina) ──
  // Statue: viewBox 397×884 (ratio 0.45) → canvas 40×88 @ pixelRatio 2 → displays 20×44px
  // Fountain: viewBox 1817×1473 (ratio 1.23) → canvas 88×72 @ pixelRatio 2 → displays 44×36px
  const [statueData, fountainData] = await Promise.all([
    loadSvgAsMapImage(STATUE_SVG, 40, 88),
    loadSvgAsMapImage(FOUNTAIN_SVG, 58, 72)
  ]);
  map.addImage('statue-icon', statueData, { pixelRatio: 2 });
  map.addImage('fountain-icon', fountainData, { pixelRatio: 2 });

  // ── 3. Data source ──
  map.addSource('places', { type:'geojson', data: places });

  // ── 4. Symbol layer with SVG icons ──
  map.addLayer({
    id: 'places-symbol',
    type: 'symbol',
    source: 'places',
    layout: {
      'icon-image': ['match', ['get','category'], 'Fountain', 'fountain-icon', 'statue-icon'],
      'icon-size': 0.58,
      'icon-allow-overlap': true,
      'icon-anchor': ['match', ['get','category'], 'Fountain', 'bottom', 'bottom']
    }
  });

  // ── 5. Label layer (shows at high zoom) ──
  map.addLayer({
    id: 'places-label',
    type: 'symbol',
    source: 'places',
    minzoom: 14.2,
    layout: {
      'text-field': ['get','name'],
      'text-font': ['Noto Sans Regular'],
      'text-size': 13,
      'text-offset': [0, 1.6],
      'text-variable-anchor': ['bottom','top','left','right'],
      'text-padding': 4
    },
    paint: {
      'text-color': '#4d4d4d',
      'text-halo-color': 'rgba(255,255,255,0.95)',
      'text-halo-width': 1.6
    }
  });

  // ── 6. Popup on hover ──
  let hoverPopup = null;
  map.on('mouseenter','places-symbol',(e)=>{
    map.getCanvas().style.cursor='pointer';
    const f=e.features[0], p=f.properties, coords=f.geometry.coordinates.slice();
    if (hoverPopup) hoverPopup.remove();
    hoverPopup = new maplibregl.Popup({offset:16, closeButton:false, closeOnClick:false})
      .setLngLat(coords)
      .setHTML(`<div class="popup">
        <img src="${p.image}" alt="">
        <div class="content">
          <h2>${p.name}</h2>
          <span class="tag">${p.category}</span>
          <p>${p.description}</p>
        </div>
      </div>`)
      .addTo(map);
  });
  map.on('mouseleave','places-symbol',()=>{
    map.getCanvas().style.cursor='';
    if (hoverPopup) { hoverPopup.remove(); hoverPopup = null; }
  });

  // ── 7. Filter buttons ──
  function filter(type) {
    document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    document.getElementById(type).classList.add('active');
    if (type === 'all') {
      map.setFilter('places-symbol', null);
      map.setFilter('places-label', null);
    } else {
      const cat = type === 'fountains' ? 'Fountain' : 'Statue';
      const expr = ['==', ['get','category'], cat];
      map.setFilter('places-symbol', expr);
      map.setFilter('places-label', expr);
    }
  }
  document.getElementById('all').onclick=()=>{ filter('all'); map.flyTo({center:[-77.0369,38.9007], zoom:12.45, duration:1100}); };
  document.getElementById('fountains').onclick=()=>filter('fountains');
  document.getElementById('statues').onclick=()=>filter('statues');
});
</script>
