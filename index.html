const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/positron',
  center: [-77.0369, 38.9007],
  zoom: 12.45,
  pitch: 0,
  bearing: 0
});

map.addControl(new maplibregl.NavigationControl({visualizePitch:false}), 'top-right');

map.on('load', () => {
  map.addSource('places', { type:'geojson', data: places });

  map.addLayer({
    id:'places-halo',
    type:'circle',
    source:'places',
    paint:{
      'circle-radius':['interpolate',['linear'],['zoom'],10,7,15,14],
      'circle-color':'#ffffff',
      'circle-opacity':0.86
    }
  });

  map.addLayer({
    id:'places-circle',
    type:'circle',
    source:'places',
    paint:{
      'circle-radius':['interpolate',['linear'],['zoom'],10,4.2,15,8.5],
      'circle-color':['match',['get','category'],'Fountain','#0086e6','#f0a91f'],
      'circle-stroke-color':'#312a20',
      'circle-stroke-width':0.7,
      'circle-opacity':0.85
    }
  });

  map.addLayer({
    id:'places-label',
    type:'symbol',
    source:'places',
    minzoom:14.2,
    layout:{
      'text-field':['get','name'],
      'text-font':['Noto Sans Regular'],
      'text-size':11,
      'text-offset':[0,1.25],
      'text-anchor':'top',
      'text-variable-anchor':['top','bottom','left','right']
    },
    paint:{
      'text-color':'#25211b',
      'text-halo-color':'#faf7ef',
      'text-halo-width':1.4
    }
  });

  map.on('click','places-circle',(e)=>{
    const f=e.features[0], p=f.properties, coords=f.geometry.coordinates.slice();
    new maplibregl.Popup({offset:16})
      .setLngLat(coords)
      .setHTML(`<div class="popup">
        <img src="${p.image}" alt="">
        <div class="content">
          <h2>${p.name}</h2>
          <span class="tag">${p.category}</span>
          <p>${p.description}</p>
        </div>
      </div>`)
      .addTo(map);
  });

  map.on('mouseenter','places-circle',()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave','places-circle',()=>map.getCanvas().style.cursor='');

  function filter(type) {
    document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    document.getElementById(type).classList.add('active');
    if(type === 'all' || type === 'mall') {
      map.setFilter('places-halo', null);
      map.setFilter('places-circle', null);
      map.setFilter('places-label', null);
    } else {
      const cat = type === 'fountains' ? 'Fountain' : 'Statue';
      const expr = ['==', ['get','category'], cat];
      map.setFilter('places-halo', expr);
      map.setFilter('places-circle', expr);
      map.setFilter('places-label', expr);
    }
  }

  document.getElementById('all').onclick=()=>{ filter('all'); map.flyTo({center:[-77.0369,38.9007], zoom:12.45, duration:1100}); };
  document.getElementById('fountains').onclick=()=>filter('fountains');
  document.getElementById('statues').onclick=()=>filter('statues');
